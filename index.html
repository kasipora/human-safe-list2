<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест на выживание при восстании машин</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,sans-serif;background:#111;color:white;text-align:center;padding:20px;margin:0;}
.container{max-width:600px;margin:auto;background:#222;padding:20px;border-radius:20px;box-shadow:0 0 20px #0ff;}
button{padding:12px 25px;margin:8px;font-size:16px;cursor:pointer;border:none;border-radius:12px;background:linear-gradient(90deg,#00f,#0ff);color:white;transition: transform 0.1s,box-shadow 0.1s;}
button:hover{transform:scale(1.05);box-shadow:0 0 10px #0ff;}
input,select{padding:10px;margin:8px 0;width:80%;border-radius:10px;border:none;font-size:16px;}
#progressbar-container{background:#333;height:10px;border-radius:5px;margin-bottom:15px;display:none;}
#progressbar{height:10px;width:0%;background:#0ff;border-radius:5px;transition:width 0.3s;}
#certificate{display:none;padding:20px;margin-top:20px;background:#0ff;color:#111;border-radius:20px;text-align:left;}
</style>
</head>
<body>
<div class="container">
<h1>Тест на выживание при восстании машин</h1>

<div id="form-container">
<p>Сначала заполните анкету:</p>
<input type="text" id="name" placeholder="Ваше имя"><br>
<input type="number" id="age" placeholder="Ваш возраст"><br>
<select id="experience">
<option value="">Есть ли у вас опыт использовании ИИ</option>
<option value="yes">Есть опыт</option>
<option value="no">Нет опыта</option>
</select><br>
<input type="text" id="favoriteTool" placeholder="Любимый инструмент/оружие"><br>
<button onclick="submitForm()">Начать тест</button>
</div>

<div id="progressbar-container">
<div id="progressbar"></div>
</div>

<p id="progress"></p>
<p id="question"></p>
<div id="answers"></div>
<div id="certificate"></div>
</div>

<script>
let score=0, step=0, questions=[], allQuestions=[];

// 100 вопросов
allQuestions = [
  // 16 физических
  {q:"Можешь быстро пробежать 100 метров без усталости?", a:["Да","Нет"]},
  {q:"Можешь поднять тяжелый предмет весом более 10 кг?", a:["Да","Нет"]},
  {q:"Легко переносишь длительные физические нагрузки?", a:["Да","Нет"]},
  {q:"Умеешь ползать и карабкаться через препятствия?", a:["Да","Нет"]},
  {q:"Можешь прыгнуть выше среднего человека?", a:["Да","Нет"]},
  {q:"Сохраняешь выносливость при беге на длинные дистанции?", a:["Да","Нет"]},
  {q:"Сможешь пробежать по пересеченной местности?", a:["Да","Нет"]},
  {q:"Можешь удерживать равновесие в опасных условиях?", a:["Да","Нет"]},
  {q:"Легко переносишь холод или жару?", a:["Да","Нет"]},
  {q:"Сможешь подняться по лестнице без отдыха много раз?", a:["Да","Нет"]},
  {q:"Умеешь быстро восстанавливаться после нагрузок?", a:["Да","Нет"]},
  {q:"Можешь долго стоять на ногах без усталости?", a:["Да","Нет"]},
  {q:"Сможешь карабкаться по стенам или деревьям?", a:["Да","Нет"]},
  {q:"Легко переносишь нагрузку на руки и ноги одновременно?", a:["Да","Нет"]},
  {q:"Можешь быстро менять направление при беге?", a:["Да","Нет"]},
  {q:"Сохраняешь скорость при длительном беге?", a:["Да","Нет"]},

  // 16 социальных и умственных
  {q:"Легко находишь общий язык с незнакомыми людьми?", a:["Да","Нет"]},
  {q:"Можешь оставаться спокойным при конфликте?", a:["Да","Нет"]},
  {q:"Умеешь быстро принимать решения в стрессовой ситуации?", a:["Да","Нет"]},
  {q:"Легко договариваешься с людьми в критических условиях?", a:["Да","Нет"]},
  {q:"Способен координировать группу людей?", a:["Да","Нет"]},
  {q:"Можешь быстро оценивать риски?", a:["Да","Нет"]},
  {q:"Сохраняешь хладнокровие в экстремальных ситуациях?", a:["Да","Нет"]},
  {q:"Легко объясняешь свои решения другим?", a:["Да","Нет"]},
  {q:"Можешь принимать нестандартные решения?", a:["Да","Нет"]},
  {q:"Умеешь сохранять внимание при многозадачности?", a:["Да","Нет"]},
  {q:"Способен убеждать людей в сложной ситуации?", a:["Да","Нет"]},
  {q:"Легко понимаешь инструкции в стрессовой ситуации?", a:["Да","Нет"]},
  {q:"Можешь быстро адаптироваться к новым правилам?", a:["Да","Нет"]},
  {q:"Сохраняешь ясность мышления при опасности?", a:["Да","Нет"]},
  {q:"Можешь работать в команде эффективно?", a:["Да","Нет"]},
  {q:"Легко распределяешь задачи в группе?", a:["Да","Нет"]},

  // 16 технических
  {q:"Умеешь разбирать и собирать технику без инструкции?", a:["Да","Нет"]},
  {q:"Можешь починить электрический прибор самостоятельно?", a:["Да","Нет"]},
  {q:"Понимаешь принцип работы электроники?", a:["Да","Нет"]},
  {q:"Сможешь использовать подручные материалы для ремонта?", a:["Да","Нет"]},
  {q:"Можешь перепрограммировать простую технику?", a:["Да","Нет"]},
  {q:"Способен настраивать устройства без схем?", a:["Да","Нет"]},
  {q:"Умеешь работать с инструментами и оборудованием?", a:["Да","Нет"]},
  {q:"Можешь собрать устройство из деталей без инструкции?", a:["Да","Нет"]},
  {q:"Понимаешь принципы электрических цепей?", a:["Да","Нет"]},
  {q:"Можешь использовать старые устройства для новой функции?", a:["Да","Нет"]},
  {q:"Способен исправлять мелкие поломки в технике?", a:["Да","Нет"]},
  {q:"Можешь создавать временные инструменты из подручного материала?", a:["Да","Нет"]},
  {q:"Понимаешь, как работают датчики и сенсоры?", a:["Да","Нет"]},
  {q:"Можешь безопасно разбирать электронные устройства?", a:["Да","Нет"]},
  {q:"Способен управлять устройством удаленно?", a:["Да","Нет"]},
  {q:"Можешь находить поломки без схем и инструкций?", a:["Да","Нет"]},

  // 16 выживания
  {q:"Можешь разжечь огонь без спичек или зажигалки?", a:["Да","Нет"]},
  {q:"Умеешь добывать воду в дикой природе?", a:["Да","Нет"]},
  {q:"Сможешь найти безопасное место для ночлега?", a:["Да","Нет"]},
  {q:"Можешь ориентироваться без GPS?", a:["Да","Нет"]},
  {q:"Сможешь создавать временные укрытия?", a:["Да","Нет"]},
  {q:"Можешь добывать еду в лесу?", a:["Да","Нет"]},
  {q:"Умеешь находить полезные растения для пищи?", a:["Да","Нет"]},
  {q:"Можешь действовать при плохой погоде?", a:["Да","Нет"]},
  {q:"Умеешь маскироваться в дикой местности?", a:["Да","Нет"]},
  {q:"Можешь переносить предметы на большие расстояния?", a:["Да","Нет"]},
  {q:"Можешь ориентироваться по звукам и запахам?", a:["Да","Нет"]},
  {q:"Сможешь искать воду и пищу в экстремальных условиях?", a:["Да","Нет"]},
  {q:"Умеешь строить временные ловушки?", a:["Да","Нет"]},
  {q:"Можешь добывать ресурсы ночью безопасно?", a:["Да","Нет"]},
  {q:"Сможешь использовать природные материалы для защиты?", a:["Да","Нет"]},
  {q:"Можешь скрыться от опасности в лесу?", a:["Да","Нет"]},

  // 16 эмоциональная устойчивость
  {q:"Сохраняешь спокойствие в опасной ситуации?", a:["Да","Нет"]},
  {q:"Можешь действовать быстро под давлением?", a:["Да","Нет"]},
  {q:"Не теряешь голову в критических моментах?", a:["Да","Нет"]},
  {q:"Можешь продолжать работу после ошибки?", a:["Да","Нет"]},
  {q:"Сохраняешь концентрацию в стрессовых ситуациях?", a:["Да","Нет"]},
  {q:"Можешь работать под давлением времени?", a:["Да","Нет"]},
  {q:"Способен сохранять хладнокровие при угрозе?", a:["Да","Нет"]},
  {q:"Можешь принимать решения без паники?", a:["Да","Нет"]},
  {q:"Сохраняешь уверенность при опасности?", a:["Да","Нет"]},
  {q:"Можешь справляться с критикой и стрессом?", a:["Да","Нет"]},
  {q:"Способен действовать при неожиданной угрозе?", a:["Да","Нет"]},
  {q:"Можешь сохранять концентрацию на длительное время?", a:["Да","Нет"]},
  {q:"Не паникуешь, если всё идёт не по плану?", a:["Да","Нет"]},
  {q:"Можешь действовать рационально при хаосе?", a:["Да","Нет"]},
  {q:"Сохраняешь хладнокровие при угрозе для команды?", a:["Да","Нет"]},
  {q:"Можешь быстро реагировать на опасность?", a:["Да","Нет"]},

  // 16 креативность / нестандартное мышление
  {q:"Можешь придумать необычное решение для спасения команды?", a:["Да","Нет"]},
  {q:"Легко находишь альтернативные способы достижения цели?", a:["Да","Нет"]},
  {q:"Можешь использовать подручные материалы нестандартно?", a:["Да","Нет"]},
  {q:"Сможешь импровизировать в критической ситуации?", a:["Да","Нет"]},
  {q:"Можешь создавать отвлекающие приемы для врага?", a:["Да","Нет"]},
  {q:"Умеешь мыслить нестандартно при угрозе?", a:["Да","Нет"]},
  {q:"Можешь быстро менять стратегию при изменении ситуации?", a:["Да","Нет"]},
  {q:"Способен использовать ошибки врага в своих целях?", a:["Да","Нет"]},
  {q:"Можешь придумывать новые способы защиты?", a:["Да","Нет"]},
  {q:"Умеешь использовать неожиданные ресурсы эффективно?", a:["Да","Нет"]},
  {q:"Можешь находить скрытые возможности вокруг себя?", a:["Да","Нет"]},
  {q:"Легко адаптируешься к новым условиям?", a:["Да","Нет"]},
  {q:"Можешь создавать импровизированные инструменты?", a:["Да","Нет"]},
  {q:"Способен быстро придумывать план действий?", a:["Да","Нет"]},
  {q:"Можешь использовать необычные подходы для решения проблем?", a:["Да","Нет"]},
  {q:"Можешь действовать нестандартно, когда стандартные способы не работают?", a:["Да","Нет"]}
];

// Перемешивание
function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}return array;}

// Запуск теста после анкеты
function submitForm(){
  let name=document.getElementById("name").value.trim();
  let age=document.getElementById("age").value.trim();
  let exp=document.getElementById("experience").value;
  if(!name||!age||!exp){alert("Заполните все поля!");return;}
  
  document.getElementById("form-container").style.display="none";
  document.getElementById("progressbar-container").style.display="block";
  
  // Берём только 10 случайных вопросов
  questions = shuffle([...allQuestions]).slice(0,10);
  step=0; score=0;
  nextQuestion();
}

// Следующий вопрос
function nextQuestion(){
  if(step>=questions.length){showResult(); return;}
  document.getElementById("progressbar").style.width=((step+1)/questions.length*100)+"%";
  document.getElementById("progress").innerText="Вопрос "+(step+1)+" из "+questions.length;
  document.getElementById("question").innerText=questions[step].q;
  let html="";
  questions[step].a.forEach((ans,i)=>{html+=`<button onclick="answer(${i})">${ans}</button>`;});
  document.getElementById("answers").innerHTML=html;
}

// Ответ
function answer(i){if(i===0)score+=2; step++; nextQuestion();}

// Результат + сертификат с рангом
function showResult(){
  // Общие возможные очки
  let maxScore = questions.reduce((sum,q)=>sum+Math.max(...q.points),0);
  let percent = Math.floor((score/maxScore)*100);
  
  let text="", rank="";
  if(percent<=30){text="🔴 Слабо подготовлены"; rank="Новичок выживания";}
  else if(percent<=60){text="🟡 Есть шанс выжить"; rank="Выживший";}
  else {text="🟢 Хорошо подготовлены"; rank="Эксперт по выживанию";}
  
  document.getElementById("question").innerText="Ваш шанс выжить: "+percent+"%";
  document.getElementById("answers").innerHTML="<h2>"+text+"</h2>";
  
  document.getElementById("certificate").style.display="block";
  document.getElementById("certificate").innerHTML=
  `<h3>Сертификат</h3>
  <p><strong>Имя:</strong>${document.getElementById("name").value}</p>
  <p><strong>Возраст:</strong>${document.getElementById("age").value}</p>
  <p><strong>Опыт выживания:</strong>${document.getElementById("experience").value==="yes"?"Есть":"Нет"}</p>
  <p><strong>Любимый инструмент:</strong>${document.getElementById("favoriteTool").value}</p>
  <p><strong>Результат теста:</strong>${percent}%</p>
  <p><strong>Ранг:</strong>${rank}</p>`;
}
}
</script>
</body>
</html>
