<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест на выживание</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0ff">
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family: 'Arial', sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
  margin:0;
}
.container{
  max-width:400px;
  margin:auto;
  background:#222;
  padding:20px;
  border-radius:20px;
  box-shadow: 0 0 20px #0ff;
}
button{
  padding:15px 25px;
  margin:10px;
  font-size:20px;
  cursor:pointer;
  border:none;
  border-radius:12px;
  background: linear-gradient(90deg, #00f, #0ff);
  color:white;
  transition: transform 0.1s, box-shadow 0.1s;
}
button:hover{
  transform: scale(1.05);
  box-shadow: 0 0 10px #0ff;
}
#progressbar-container{
  background:#333;
  height:10px;
  border-radius:5px;
  margin-bottom:15px;
}
#progressbar{
  height:10px;
  width:0%;
  background:#0ff;
  border-radius:5px;
  transition: width 0.3s;
}
@keyframes fadeIn{
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>
<body>

<div class="container">

<h1>Тест на выживание при восстании машин</h1>

<div id="progressbar-container">
  <div id="progressbar"></div>
</div>

<p id="progress"></p>
<p id="question">Нажми начать</p>
<button onclick="startTest()">Начать тест</button>
<div id="answers"></div>

</div>

<script>
let score = 0
let step = 0

const questions = [
{ q:"Ты умеешь прятаться?", a:["Да","Нет"] },
{ q:"Ты умеешь чинить технику?", a:["Да","Нет"] },
{ q:"Ты умеешь взламывать системы?", a:["Да","Нет"] },
{ q:"Ты быстро бегаешь?", a:["Да","Нет"] },
{ q:"Ты умеешь договариваться?", a:["Да","Нет"] },
{ q:"Ты умеешь ориентироваться без GPS?", a:["Да","Нет"] },
{ q:"Ты умеешь маскироваться?", a:["Да","Нет"] },
{ q:"Ты умеешь готовить еду в дикой природе?", a:["Да","Нет"] },
{ q:"Ты умеешь отключать камеры?", a:["Да","Нет"] },
{ q:"Ты умеешь сохранять спокойствие в опасности?", a:["Да","Нет"] }
]

// Запуск теста
function startTest(){
  score = 0
  step = 0
  nextQuestion()
}

// Следующий вопрос
function nextQuestion(){
  if(step >= questions.length){
    showResult()
    return
  }
  document.getElementById("progressbar").style.width =
    ((step+1)/questions.length*100) + "%"
  document.getElementById("progress").innerText =
    "Вопрос " + (step+1) + " из " + questions.length
  document.getElementById("question").innerText = questions[step].q

  let html = ""
  questions[step].a.forEach((answer,i)=>{
    html += `<button onclick="answer(${i})">${answer}</button>`
  })
  document.getElementById("answers").innerHTML = html
}

// Обработка ответа
function answer(i){
  if(i==0){ score += 2 }
  step++
  nextQuestion()
}

// Результат
function showResult(){
  let percent = Math.floor((score/(questions.length*2))*100)
  let text = ""
  if(score <=3){
      text="🔴 Роботы тебя ищут"
  }
  else if(score <=7){
      text="🟡 Есть шанс выжить"
  }
  else{
      text="🟢 Роботы тебя пощадят"
  }
  document.getElementById("question").innerText =
      "Твой шанс выжить: "+percent+"%"
  document.getElementById("answers").innerHTML =
      "<h2 style='animation:fadeIn 1s'>"+text+"</h2>"
}
</script>

</body>
</html>
