<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест на пригодность к выживанию</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,sans-serif;background:#111;color:white;text-align:center;padding:20px;margin:0;}
.container{max-width:600px;margin:auto;background:#222;padding:20px;border-radius:20px;box-shadow:0 0 20px #0ff;}
button{padding:12px 25px;margin:8px;font-size:16px;cursor:pointer;border:none;border-radius:12px;background:linear-gradient(90deg,#00f,#0ff);color:white;transition: transform 0.1s,box-shadow 0.1s;}
button:hover{transform:scale(1.05);box-shadow:0 0 10px #0ff;}
input,select{padding:10px;margin:8px 0;width:80%;border-radius:10px;border:none;font-size:16px;}
#progressbar-container{background:#333;height:10px;border-radius:5px;margin-bottom:15px;display:none;}
#progressbar{height:10px;width:0%;background:#0ff;border-radius:5px;transition:width 0.3s;}
#certificate{display:none;padding:20px;margin-top:20px;background:#0ff;color:#111;border-radius:20px;text-align:left;}
</style>
</head>
<body>
<div class="container">
<h1>Тест на пригодность к выживанию</h1>

<div id="form-container">
<p>Сначала заполните анкету:</p>
<input type="text" id="name" placeholder="Ваше имя"><br>
<input type="number" id="age" placeholder="Ваш возраст"><br>
<select id="experience">
<option value="">Выберите опыт выживания</option>
<option value="yes">Есть опыт</option>
<option value="no">Нет опыта</option>
</select><br>
<input type="text" id="favoriteTool" placeholder="Любимый инструмент/оружие"><br>
<button onclick="submitForm()">Начать тест</button>
</div>

<div id="progressbar-container">
<div id="progressbar"></div>
</div>

<p id="progress"></p>
<p id="question"></p>
<div id="answers"></div>
<div id="certificate"></div>
</div>

<script>
let score=0, step=0, questions=[], allQuestions=[];

// 100 вопросов
allQuestions = [
{q:"Можешь быстро пробежать 100 метров?",a:["Да","Нет"]},
{q:"Можешь поднять предмет весом 10 кг?",a:["Да","Нет"]},
{q:"Легко переносишь длительные нагрузки?",a:["Да","Нет"]},
{q:"Умеешь ползать через препятствия?",a:["Да","Нет"]},
{q:"Можешь прыгнуть выше среднего?",a:["Да","Нет"]},
{q:"Сохраняешь выносливость при беге?",a:["Да","Нет"]},
{q:"Сможешь пробежать по пересечёнке?",a:["Да","Нет"]},
{q:"Можешь удерживать равновесие в опасности?",a:["Да","Нет"]},
{q:"Легко переносишь холод или жару?",a:["Да","Нет"]},
{q:"Сможешь подняться по лестнице без отдыха?",a:["Да","Нет"]},
// ... добавь остальные до 100
];

// Перемешивание массива
function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}return array;}

// Запуск теста после анкеты
function submitForm(){
  let name=document.getElementById("name").value.trim();
  let age=document.getElementById("age").value.trim();
  let exp=document.getElementById("experience").value;
  if(!name||!age||!exp){alert("Заполните все поля!");return;}
  
  document.getElementById("form-container").style.display="none";
  document.getElementById("progressbar-container").style.display="block";
  
  // Выбираем 10 случайных вопросов из 100
  questions = shuffle([...allQuestions]).slice(0,10);
  step=0; score=0;
  nextQuestion();
}

// Следующий вопрос
function nextQuestion(){
  if(step>=questions.length){showResult(); return;}
  document.getElementById("progressbar").style.width=((step+1)/questions.length*100)+"%";
  document.getElementById("progress").innerText="Вопрос "+(step+1)+" из "+questions.length;
  document.getElementById("question").innerText=questions[step].q;
  let html="";
  questions[step].a.forEach((ans,i)=>{html+=`<button onclick="answer(${i})">${ans}</button>`;});
  document.getElementById("answers").innerHTML=html;
}

// Ответ
function answer(i){if(i===0)score+=2; step++; nextQuestion();}

// Результат + сертификат
function showResult(){
  let percent=Math.floor((score/(questions.length*2))*100);
  let text="";
  if(percent<=30)text="🔴 Слабо подготовлены";
  else if(percent<=60)text="🟡 Есть шанс выжить";
  else text="🟢 Хорошо подготовлены";
  
  document.getElementById("question").innerText="Ваш шанс выжить: "+percent+"%";
  document.getElementById("answers").innerHTML="<h2>"+text+"</h2>";
  
  document.getElementById("certificate").style.display="block";
  document.getElementById("certificate").innerHTML=
  `<h3>Сертификат</h3>
  <p><strong>Имя:</strong>${document.getElementById("name").value}</p>
  <p><strong>Возраст:</strong>${document.getElementById("age").value}</p>
  <p><strong>Опыт выживания:</strong>${document.getElementById("experience").value==="yes"?"Есть":"Нет"}</p>
  <p><strong>Любимый инструмент:</strong>${document.getElementById("favoriteTool").value}</p>
  <p><strong>Результат теста:</strong>${percent}%</p>`;
}
</script>
</body>
</html>
